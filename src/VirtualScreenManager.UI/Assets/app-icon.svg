<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="screenGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60CDFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0078D4" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background monitor (offset, lighter blue) -->
  <rect x="52" y="28" width="160" height="120" rx="12" ry="12" fill="#60CDFF" opacity="0.6"/>
  <!-- Background screen inset -->
  <rect x="62" y="38" width="140" height="90" rx="6" ry="6" fill="#60CDFF" opacity="0.3"/>
  <!-- Background monitor stand -->
  <rect x="112" y="148" width="40" height="14" rx="4" ry="4" fill="#60CDFF" opacity="0.4"/>
  <rect x="96" y="158" width="72" height="8" rx="4" ry="4" fill="#60CDFF" opacity="0.4"/>

  <!-- Foreground monitor frame -->
  <rect x="28" y="52" width="168" height="126" rx="12" ry="12" fill="#0078D4"/>
  <!-- Foreground screen inset -->
  <rect x="38" y="62" width="148" height="96" rx="6" ry="6" fill="#0053A6"/>
  <!-- Screen glow -->
  <rect x="38" y="62" width="148" height="96" rx="6" ry="6" fill="url(#screenGlow)"/>
  <!-- Foreground monitor stand -->
  <rect x="92" y="178" width="40" height="14" rx="4" ry="4" fill="#005A9E"/>
  <rect x="76" y="188" width="72" height="8" rx="4" ry="4" fill="#005A9E"/>

  <!-- Plus symbol on screen -->
  <rect x="102" y="94" width="20" height="52" rx="4" ry="4" fill="#60CDFF"/>
  <rect x="86" y="110" width="52" height="20" rx="4" ry="4" fill="#60CDFF"/>
</svg>
